[project]
name = "mymem0ry"
version = "0.1.0"
description = "Fine-tune Qwen3-0.6B with LoRA on your memory exports"
readme = "README.md"
authors = [
    { name = "cccadet", email = "perestra.ccds@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "datasets>=4.3.0",
    "openai>=1.0",
    "peft>=0.18.1",
    "python-dotenv>=1.0",
    "pydantic>=2.12.5",
    "torch>=2.10.0",
    "transformers>=5.5.0",
    "trl>=0.24.0",
    "typer>=0.24.1",
    "unsloth>=2026.4.4",
    "unsloth-zoo>=2026.4.3",
]

[project.scripts]
mymem0ry = "mem0ry.cli.main:app"

[build-system]
requires = ["uv_build>=0.10.12,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "ruff>=0.15.9",
]
